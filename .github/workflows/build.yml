name: Build Linux

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm install
        run: npm install

      - name: Electron Builder – Linux
        run: npx electron-builder --linux AppImage deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          name: Letters v0.2.0
          draft: true
          files: |
            release/*.AppImage
            release/*.deb
