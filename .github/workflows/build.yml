name: Build Linux

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rust-Toolchain installieren
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Build-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: System-Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: npm install
        run: npm install

      - name: Frontend bauen (Vite)
        run: npm run build

      - name: Tauri bauen & Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Letters v__VERSION__'
          releaseBody: |
            ## Linux Download

            | Format | Empfohlen für |
            |---|---|
            | `.AppImage` | Universell — läuft auf jeder Distro ohne Installation |
            | `.deb` | Ubuntu / Debian / Mint |
          releaseDraft: true
          prerelease: false
          args: '--bundles deb,appimage'
