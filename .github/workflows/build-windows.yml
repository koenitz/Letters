name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rust-Toolchain installieren
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Build-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: npm install
        run: npm install

      - name: Frontend bauen (Vite)
        run: npm run build

      - name: Tauri bauen & Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Letters v__VERSION__'
          releaseBody: |
            ## Downloads

            | Plattform | Format | Datei |
            |---|---|---|
            | Windows | Installer (`.exe`) | `Letters_x.x.x_x64-setup.exe` |
            | Linux | AppImage | `letters_x.x.x_amd64.AppImage` |
            | Linux | Debian | `letters_x.x.x_amd64.deb` |
          releaseDraft: true
          prerelease: false
          args: '--bundles nsis'
